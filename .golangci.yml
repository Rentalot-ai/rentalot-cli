version: "2"

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - misspell
  exclusions:
    paths:
      - vendor
    rules:
      - path: _test\.go
        linters:
          - errcheck
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
    misspell:
      locale: US
      extra-words:
        - typo: cancelled
          correction: cancelled
        - typo: cancelling
          correction: cancelling
